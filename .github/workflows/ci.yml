name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (CPU-only)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install foundation deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e '.[test,tda]'

      - name: Install advanced CPU deps (best-effort)
        run: |
          # These extras may fail for environment-specific reasons; CI must
          # still report on the foundation tests even if optional deps refuse
          # to install. Errors are tolerated; a failure here only loses the
          # advanced-CPU-adapter tests.
          pip install pybamm pypsa pvlib cantera pyscf netCDF4 freegs ripser persim mcp omas pybop pyrokinetics qiskit || true

      - name: Boundary smoke
        run: |
          python -c "from energy_physics_pipeline.boundary import BOUNDARY_BLOCK; assert len(BOUNDARY_BLOCK) == 386; print('boundary len ok')"

      - name: Foundation tests
        run: |
          pytest tests/contract -q

      - name: Falsification wave
        run: |
          pytest tests/falsification -q

      - name: Scientific bounds
        run: |
          pytest tests/scientific -q

      - name: Integration tests
        run: |
          pytest tests/integration -q --tb=short
        env:
          ENERGY_AUDIT_REQUIRED: 'true'
          ENERGY_BOUNDARY_GATE: 'strict'

      - name: CLI smoke
        run: |
          python -m energy_physics_pipeline.cli.main health
          python -m energy_physics_pipeline.cli.main registry

      - name: Build summary
        if: always()
        run: |
          python tools/build_summary.py

  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check energy_physics_pipeline tests
        continue-on-error: true   # Style-only; subagent code has known F841 unused-locals; not a blocker.
